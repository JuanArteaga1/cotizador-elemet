# ============================================
# Docker Compose - ELEMENT Cotizador + Stack
# ============================================

version: "3.8"

services:
  # ─── FRONTEND: ELEMENT Cotizador ─────────
  element-cotizador:
    build:
      context: ./element-cotizador
      dockerfile: Dockerfile
    container_name: element-cotizador
    ports:
      - "5173:80"
    environment:
      # URL del backend SaaS (ajusta según tu infraestructura)
      - API_URL=http://saas-backend:3001/api/v1
      # Slug de la tienda en el SaaS
      - SHOP_SLUG=elemet-haus
    networks:
      - element-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── EJEMPLO: Otra app en el mismo stack ─────
